name: Hourly Scraping and Database Updates

on:
  schedule:
    - cron: "0 * * * *" # Runs every hour
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: "true"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_NAME: ratesapi-data
      D1_REMOTE: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Verify D1 database access
        run: |
          echo "Verifying D1 database access for database: ratesapi-data"
          npx wrangler d1 list
          echo "Testing database connectivity:"
          npx wrangler d1 execute ratesapi-data --remote --command="SELECT name FROM sqlite_master WHERE type='table';"

      - name: Run the scraper script for mortgage rates
        run: bun run bin/scrape-mortgage-rates.ts

      - name: Run the scraper script for personal loan rates
        run: bun run bin/scrape-personal-loan-rates.ts

      - name: Run the scraper script for car loan rates
        run: bun run bin/scrape-car-loan-rates.ts

      - name: Run the scraper script for credit card rates
        run: bun run bin/scrape-credit-card-rates.ts

      - name: Verify saved data
        run: |
          npx wrangler d1 execute ratesapi-data --remote --command="SELECT data_type, last_updated FROM latest_data ORDER BY data_type"
          npx wrangler d1 execute ratesapi-data --remote --command="SELECT data_type, date, COUNT(*) as count FROM historical_data GROUP BY data_type, date ORDER BY date DESC LIMIT 10"
